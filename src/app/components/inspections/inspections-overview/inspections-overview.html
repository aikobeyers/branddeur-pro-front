<section class="inspections-overview">
  <button
    type="button"
    class="download-button"
    (click)="onDownload()"
    [disabled]="isGenerating()"
  >
    {{ isGenerating() ? 'Genereren...' : 'Download' }}
  </button>

  @if (generateError()) {
    <p class="download-error">{{ generateError() }}</p>
  }
</section>
