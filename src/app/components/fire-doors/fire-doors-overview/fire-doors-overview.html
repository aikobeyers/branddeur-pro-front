<section class="fire-doors-overview">
	<h1>Branddeuren Overzicht</h1>

	@if (branddeuren$ | async; as branddeuren) {
		@if (branddeuren.length === 0) {
			<p>Geen branddeuren gevonden.</p>
		} @else {
			<div class="card-grid">
				@for (branddeur of branddeuren; track branddeur._id) {
					<app-firedoor-card [branddeur]="branddeur" />
				}
			</div>
		}
	} @else {
		<p>Laden...</p>
	}
</section>
