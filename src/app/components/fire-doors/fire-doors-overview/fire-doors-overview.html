<section class="fire-doors-overview">
	<header class="overview-header">
		<div class="title-block">
			<span class="title-icon" aria-hidden="true">
				<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
					<path d="M7 3H17C18.1 3 19 3.9 19 5V19C19 20.1 18.1 21 17 21H7C5.9 21 5 20.1 5 19V5C5 3.9 5.9 3 7 3Z" fill="none" stroke="currentColor" stroke-width="1.8"/>
					<path d="M10 3V21" fill="none" stroke="currentColor" stroke-width="1.8"/>
					<path d="M13.5 12H14.5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
				</svg>
			</span>

			<div>
				<h1>Branddeuren Beheer</h1>
				<p class="subtitle">Registreer en beheer alle branddeuren in uw gebouwen</p>
			</div>
		</div>

		<button class="new-firedoor-button" type="button">
			<span class="plus" aria-hidden="true">+</span>
			Nieuwe Branddeur
		</button>
	</header>

	@if (branddeuren$ | async; as branddeuren) {
		@if (branddeuren.length === 0) {
			<p>Geen branddeuren gevonden.</p>
		} @else {
			<div class="card-grid">
				@for (branddeur of branddeuren; track branddeur._id) {
					<app-firedoor-card [branddeur]="branddeur" />
				}
			</div>
		}
	} @else {
		<p>Laden...</p>
	}
</section>
